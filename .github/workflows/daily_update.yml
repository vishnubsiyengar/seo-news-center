name: Daily SEO Intelligence Update

on:
  schedule:
    # This runs the agents every day at 02:30 UTC (8:00 AM IST)
    - cron: '30 2 * * *'
  workflow_dispatch: # This allows you to trigger it manually via a button

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/checkout@v4
        with:
          python-version: '3.9'

      - name: Install Dependencies
        run: |
          python -m pip install playwright groq supabase python-dotenv
          python -m playwright install chromium

      - name: Run Orchestrator
        env:
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_KEY: ${{ secrets.SUPABASE_KEY }}
        run: python main_orchestrator.py